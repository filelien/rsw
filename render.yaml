services:
  # Frontend Service
  - type: web
    name: raxus-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://raxus-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://raxus-api.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://raxus-frontend.onrender.com
    domains:
      - raxus-frontend.onrender.com

  # API Gateway Service
  - type: web
    name: raxus-api
    runtime: docker
    dockerfilePath: ./services/gateway/Dockerfile
    dockerContext: ./services/gateway
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raxus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raxus-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: VAULT_URL
        value: https://raxus-vault.onrender.com
      - key: VAULT_TOKEN
        generateValue: true
    domains:
      - raxus-api.onrender.com

  # Database
  - type: pserv
    name: raxus-db
    runtime: docker
    dockerfilePath: ./infra/mysql/Dockerfile
    dockerContext: ./infra/mysql
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: raxus
      - key: MYSQL_USER
        value: raxus
      - key: MYSQL_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  # Redis
  - type: redis
    name: raxus-redis
    ipAllowList: []

  # Alertmanager Service
  - type: web
    name: raxus-alertmanager
    runtime: docker
    dockerfilePath: ./services/alertmanager/Dockerfile
    dockerContext: ./services/alertmanager
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raxus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raxus-redis
          property: connectionString
      - key: GATEWAY_URL
        value: https://raxus-api.onrender.com

  # Inventory Service
  - type: web
    name: raxus-inventory
    runtime: docker
    dockerfilePath: ./services/inventory/Dockerfile
    dockerContext: ./services/inventory
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raxus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raxus-redis
          property: connectionString

  # Notifier Service
  - type: web
    name: raxus-notifier
    runtime: docker
    dockerfilePath: ./services/notifier/Dockerfile
    dockerContext: ./services/notifier
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raxus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raxus-redis
          property: connectionString
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # TaskManager Service
  - type: web
    name: raxus-taskmanager
    runtime: docker
    dockerfilePath: ./services/taskmanager/Dockerfile
    dockerContext: ./services/taskmanager
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raxus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raxus-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: raxus-redis
          property: connectionString

  # SLO Engine Service
  - type: web
    name: raxus-slo-engine
    runtime: docker
    dockerfilePath: ./services/slo-engine/Dockerfile
    dockerContext: ./services/slo-engine
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raxus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raxus-redis
          property: connectionString

  # Rules Engine Service
  - type: web
    name: raxus-rules-engine
    runtime: docker
    dockerfilePath: ./services/rules-engine/Dockerfile
    dockerContext: ./services/rules-engine
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raxus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: raxus-redis
          property: connectionString
      - key: ALERTMANAGER_URL
        value: https://raxus-alertmanager.onrender.com
      - key: NOTIFIER_URL
        value: https://raxus-notifier.onrender.com
      - key: TASKMANAGER_URL
        value: https://raxus-taskmanager.onrender.com

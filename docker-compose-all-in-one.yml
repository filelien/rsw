version: "3.9"

networks:
  raxus-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  victoria_data:
  vault_data:
  grafana_data:
  loki_data:

services:

  # ─── INFRASTRUCTURE ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: raxus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-raxus_root_secure}
      MYSQL_DATABASE: raxus
      MYSQL_USER: raxus
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-raxus_pass_secure}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - raxus-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: raxus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-raxus_redis_secure}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - raxus-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: raxus-victoriametrics
    restart: unless-stopped
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=12"
    volumes:
      - victoria_data:/storage
    ports:
      - "8428:8428"
    networks:
      - raxus-net

  vault:
    image: hashicorp/vault:latest
    container_name: raxus-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-raxus-vault-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    networks:
      - raxus-net

  grafana:
    image: grafana/grafana:latest
    container_name: raxus-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin_secure}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - raxus-net

  loki:
    image: grafana/loki:latest
    container_name: raxus-loki
    restart: unless-stopped
    volumes:
      - loki_data:/loki
      - ./infra/loki/config.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - raxus-net

  # ─── RAXUS ALL-IN-ONE SERVICE ───────────────────────────────────────
  raxus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raxus-all-in-one
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass_secure}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis_secure}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-random-64-char-string}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-raxus-vault-token}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your@email.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your_app_password}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/xxx/yyy/zzz}
    ports:
      - "3000:3000"   # Frontend
      - "8000:8000"   # Gateway API
      - "8001:8001"   # Alertmanager
      - "8002:8002"   # Inventory
      - "8003:8003"   # Notifier
      - "8004:8004"   # TaskManager
      - "8005:8005"   # SLO Engine
      - "8006:8006"   # Rules Engine
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      victoriametrics:
        condition: service_started
      vault:
        condition: service_started
    networks:
      - raxus-net
    healthcheck:
      test: ["CMD", "/app/health-check.sh"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ─── NGINX REVERSE PROXY ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: raxus-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - raxus
    networks:
      - raxus-net

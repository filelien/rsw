version: "3.9"

networks:
  raxus-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  victoria_data:
  vault_data:
  grafana_data:
  loki_data:

services:

  # ─── INFRASTRUCTURE ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: raxus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-raxus_root}
      MYSQL_DATABASE: raxus
      MYSQL_USER: raxus
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-raxus_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - raxus-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: raxus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-raxus_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - raxus-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: raxus-victoriametrics
    restart: unless-stopped
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=12"
    volumes:
      - victoria_data:/storage
    ports:
      - "8428:8428"
    networks:
      - raxus-net

  vault:
    image: hashicorp/vault:latest
    container_name: raxus-vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-raxus-vault-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
    networks:
      - raxus-net

  grafana:
    image: grafana/grafana:latest
    container_name: raxus-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - raxus-net

  loki:
    image: grafana/loki:latest
    container_name: raxus-loki
    restart: unless-stopped
    volumes:
      - loki_data:/loki
      - ./infra/loki/config.yml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - raxus-net

  # ─── CORE SERVICES ───────────────────────────────────────────
  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: raxus-gateway
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-supersecret-change-in-prod}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-raxus-vault-token}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - raxus-net

  alertmanager:
    build:
      context: ./services/alertmanager
      dockerfile: Dockerfile
    container_name: raxus-alertmanager
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/1
      GATEWAY_URL: http://gateway:8000
      VICTORIA_URL: http://victoriametrics:8428
    ports:
      - "8001:8001"
    depends_on:
      - mysql
      - redis
    networks:
      - raxus-net

  inventory:
    build:
      context: ./services/inventory
      dockerfile: Dockerfile
    container_name: raxus-inventory
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/2
    ports:
      - "8002:8002"
    depends_on:
      - mysql
      - redis
    networks:
      - raxus-net

  notifier:
    build:
      context: ./services/notifier
      dockerfile: Dockerfile
    container_name: raxus-notifier
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/3
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    ports:
      - "8003:8003"
    depends_on:
      - mysql
      - redis
    networks:
      - raxus-net

  taskmanager:
    build:
      context: ./services/taskmanager
      dockerfile: Dockerfile
    container_name: raxus-taskmanager
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/4
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/5
    ports:
      - "8004:8004"
    depends_on:
      - mysql
      - redis
    networks:
      - raxus-net

  celery-worker:
    build:
      context: ./services/taskmanager
      dockerfile: Dockerfile
    container_name: raxus-celery-worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/4
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/5
    depends_on:
      - mysql
      - redis
    networks:
      - raxus-net

  slo-engine:
    build:
      context: ./services/slo-engine
      dockerfile: Dockerfile
    container_name: raxus-slo-engine
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/6
      VICTORIA_URL: http://victoriametrics:8428
    ports:
      - "8005:8005"
    depends_on:
      - mysql
      - redis
    networks:
      - raxus-net

  rules-engine:
    build:
      context: ./services/rules-engine
      dockerfile: Dockerfile
    container_name: raxus-rules-engine
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://raxus:${MYSQL_PASSWORD:-raxus_pass}@mysql:3306/raxus
      REDIS_URL: redis://:${REDIS_PASSWORD:-raxus_redis}@redis:6379/7
      ALERTMANAGER_URL: http://alertmanager:8001
      NOTIFIER_URL: http://notifier:8003
      TASKMANAGER_URL: http://taskmanager:8004
    ports:
      - "8006:8006"
    depends_on:
      - mysql
      - redis
    networks:
      - raxus-net

  # ─── FRONTEND ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: raxus-frontend
    restart: unless-stopped
    environment:
      NEXTAUTH_SECRET: ${SECRET_KEY:-supersecret-change-in-prod}
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    networks:
      - raxus-net

  # ─── NGINX REVERSE PROXY ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: raxus-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - gateway
    networks:
      - raxus-net
